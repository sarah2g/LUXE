# Minimal Render service spec. You can import this to Render or configure via the dashboard.
# Replace placeholders and set environment variables in the Render dashboard (SECRET_KEY, DATABASE_URL, ALLOWED_HOSTS).
services:
  - type: web
    name: luxe-web
    env: python
    plan: free
  # Upgrade pip/setuptools/wheel first to ensure pkg_resources and wheel support,
  # then install requirements and collect static files during the build step.
  buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && python manage.py collectstatic --noinput
  startCommand: python -m gunicorn LUXEBIJOUX.wsgi --chdir LUXEBIJOUX --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
