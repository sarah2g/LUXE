# Minimal Render service spec. You can import this to Render or configure via the dashboard.
# Replace placeholders and set environment variables in the Render dashboard (SECRET_KEY, DATABASE_URL, ALLOWED_HOSTS).
services:
  - type: web
    name: luxe-web
    env: python
    plan: free
  # Install setuptools first (ensures pkg_resources is present), then install requirements
  # and collect static files during the build step.
  # Pinning setuptools in requirements.txt is also recommended.
  buildCommand: pip install setuptools==82.0.1 && pip install -r requirements.txt && python manage.py collectstatic --noinput
  startCommand: gunicorn LUXEBIJOUX.wsgi --log-file -
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
